<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WABA — WhatsApp Bot Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--s1:#ffffff;--s2:#f0efe9;--border:#e2e0d8;
  --acc:#1a7a4a;--acc2:#c94f1e;--acc3:#1a5fa8;
  --txt:#1a1a18;--muted:#8a8880;--danger:#c41e1e;
  --acc-light:#e8f5ee;--acc2-light:#fef0ea;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Instrument Sans',sans-serif;font-size:14px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:200px;min-width:200px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--acc);padding:0 18px 20px;border-bottom:1px solid var(--border);}
.logo small{display:block;font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:3px;font-weight:400;}
.nav{flex:1;margin-top:12px;}
.ni{display:flex;align-items:center;gap:9px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.ni:hover{color:var(--txt);background:var(--s2);}
.ni.on{color:var(--acc);border-left-color:var(--acc);background:var(--acc-light);}
.ni-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.nb{margin-left:auto;background:var(--acc);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;}

.api-box{padding:14px 18px;border-top:1px solid var(--border);}
.api-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-family:'JetBrains Mono',monospace;}
.api-input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:10px;padding:7px 10px;border-radius:6px;outline:none;}
.api-input:focus{border-color:var(--acc);}
.api-ok{font-size:9px;margin-top:4px;font-family:'JetBrains Mono',monospace;}
.ok{color:var(--acc);}.no{color:var(--danger);}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:10;background:var(--s1);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.mrr-tag{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--acc-light);color:var(--acc);padding:5px 12px;border-radius:20px;font-weight:600;}
.page{padding:24px 28px;flex:1;}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-family:'JetBrains Mono',monospace;}

/* FORMS */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);font-family:'Instrument Sans',sans-serif;font-size:13px;padding:9px 12px;border-radius:7px;outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--acc);background:#fff;}
.field textarea{resize:vertical;min-height:72px;}

/* BUTTONS */
.btn{font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:700;padding:9px 20px;border:none;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s;letter-spacing:.3px;}
.btn-p{background:var(--acc);color:#fff;}.btn-p:hover{background:#155f39;}.btn-p:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.btn-o{background:transparent;color:var(--txt);border:1px solid var(--border);}.btn-o:hover{border-color:var(--acc);color:var(--acc);}
.btn-sm{padding:6px 14px;font-size:11px;}
.btn-g{background:var(--acc2);color:#fff;}.btn-g:hover{background:#a8401a;}.btn-g:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* STATS */
.stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px;}
.stat-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.stat-val{font-size:30px;font-weight:700;line-height:1;color:var(--txt);}
.stat-val.g{color:var(--acc);}.stat-val.o{color:var(--acc2);}.stat-val.b{color:var(--acc3);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 13px;background:var(--s2);color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--txt);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.badge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:20px;display:inline-block;text-transform:uppercase;}
.b-new{background:#e8f0fe;color:var(--acc3);}
.b-dm{background:var(--acc2-light);color:var(--acc2);}
.b-rep{background:var(--acc-light);color:var(--acc);}
.b-conv{background:#d4edda;color:#155724;}
.b-ob{background:var(--acc);color:#fff;}
.b-del{background:#1a7a4a;color:#fff;}

/* OUTPUT */
.out{background:var(--s2);border:1px solid var(--border);padding:16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt);line-height:1.9;white-space:pre-wrap;border-radius:8px;max-height:380px;overflow-y:auto;margin-top:12px;position:relative;}
.out.live{border-color:var(--acc);}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px;}
.tab{font-size:11px;font-weight:600;padding:9px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.tab:hover{color:var(--txt);}

/* BUBBLE */
.bubble{background:var(--acc-light);border:1px solid #b8ddc9;border-radius:4px 12px 12px 12px;padding:12px 16px;font-size:12px;color:var(--txt);line-height:1.8;margin-bottom:10px;max-width:100%;}
.bubble-from{font-size:9px;color:var(--acc);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;font-family:'JetBrains Mono',monospace;}

/* PIPELINE */
.pipe{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ps{flex:1;text-align:center;padding:12px 6px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
.ps:last-child{border-right:none;}
.ps.on{background:var(--acc-light);color:var(--acc);}
.ps-n{font-size:22px;font-weight:700;display:block;margin-bottom:2px;font-family:'Instrument Sans',sans-serif;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.6;}
.a-warn{background:var(--acc2-light);border:1px solid #f3c4a8;color:var(--acc2);}
.a-ok{background:var(--acc-light);border:1px solid #b8ddc9;color:var(--acc);}
.a-info{background:#e8f0fe;border:1px solid #b8cff5;color:var(--acc3);}

/* LEAD ROW */
.lr{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);border-left:3px solid transparent;transition:all .15s;}
.lr:hover{background:var(--bg);}
.lr.on{background:var(--acc-light);border-left-color:var(--acc);}
.lr-name{font-size:13px;font-weight:600;}
.lr-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.divider{height:1px;background:var(--border);margin:16px 0;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--s1);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;cursor:pointer;border-radius:4px;transition:all .15s;}
.copy-btn:hover{border-color:var(--acc);color:var(--acc);}
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.section-tip{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.7;padding:10px 14px;background:var(--s2);border-radius:8px;border-left:3px solid var(--acc3);}

/* GUIDE */
.guide-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.guide-step:last-child{border-bottom:none;}
.gs-num{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gs-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.gs-desc{font-size:12px;color:var(--muted);line-height:1.7;}
.code-block{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt);margin-top:6px;line-height:1.7;}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">WABA<small>// wa bot agency</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="api-box">
      <div class="api-label">Grok API Key</div>
      <input class="api-input" type="password" id="apiKeyInput" placeholder="xai-..." />
      <div class="api-ok" id="apiStatus"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="pageTitle">Command Center</div>
        <div class="topbar-sub" id="pageSub">Full pipeline overview</div>
      </div>
      <div class="mrr-tag">MRR: ₹<span id="mrrVal">0</span></div>
    </div>
    <div class="page" id="pageContent"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
const KEY = 'waba_key';
let apiKey = localStorage.getItem(KEY) || '';
let currentPage = 'dashboard';

let leads = JSON.parse(localStorage.getItem('waba_leads') || 'null') || [
  {id:1,name:'Rajesh Mehta',title:'Owner',biz:'Mehta Real Estate',city:'Pune',industry:'Real Estate',source:'LinkedIn',status:'new',dmSent:false,replied:false,converted:false,onboarded:false,delivered:false},
  {id:2,name:'Priya Sharma',title:'Director',biz:'Shine Coaching',city:'Ahmedabad',industry:'Coaching',source:'Facebook',status:'new',dmSent:false,replied:false,converted:false,onboarded:false,delivered:false},
  {id:3,name:'Anil Gupta',title:'Owner',biz:'Gupta Diagnostics',city:'Jaipur',industry:'Clinic',source:'LinkedIn',status:'new',dmSent:false,replied:false,converted:false,onboarded:false,delivered:false},
];

function saveLeads(){ localStorage.setItem('waba_leads', JSON.stringify(leads)); }
function updateLead(id, patch){ leads = leads.map(l => l.id===id ? {...l,...patch} : l); saveLeads(); render(); }
function addLead(lead){ leads.push({...lead,id:Date.now()}); saveLeads(); render(); }

const INDUSTRIES = ['Real Estate','Coaching','Clinic','Salon','Logistics','Retail','Restaurant','Travel Agency','Gym','Finance/CA'];
const PAGES = {
  dashboard:{title:'Command Center',sub:'Full pipeline overview'},
  leads:{title:'Lead Generation',sub:'Find & manage prospects'},
  outreach:{title:'Outreach Engine',sub:'AI-generated DM & email scripts'},
  onboarding:{title:'Client Onboarding',sub:'Intake & bot flow generation'},
  delivery:{title:'Bot Delivery',sub:'Handover docs & SOP generation'},
  guide:{title:'How To Guide',sub:'User flow + deploy steps'},
};

function stats(){
  return {
    total:leads.length,
    dm:leads.filter(l=>l.dmSent).length,
    rep:leads.filter(l=>l.replied).length,
    conv:leads.filter(l=>l.converted).length,
    del:leads.filter(l=>l.delivered).length,
    mrr:leads.filter(l=>l.converted).length*2000,
  };
}

// ── GROK API ──────────────────────────────────────────────────────
async function callGrok(system, user, outputId){
  const el = document.getElementById(outputId);
  if(!el) return '';
  el.className = 'out live';
  el.textContent = '⏳ Generating...';
  try {
    const res = await fetch('https://api.x.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'grok-3-mini',
        max_tokens:1000,
        stream:true,
        messages:[{role:'system',content:system},{role:'user',content:user}]
      })
    });
    if(!res.ok){ el.textContent='API Error '+res.status+'. Check your key.'; el.className='out'; return ''; }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full=''; el.textContent='';
    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      const lines = dec.decode(value).split('\n').filter(l=>l.startsWith('data: ') && !l.includes('[DONE]'));
      for(const line of lines){
        try{
          const d = JSON.parse(line.slice(6));
          const t = d.choices?.[0]?.delta?.content||'';
          full+=t; el.textContent=full;
        }catch{}
      }
    }
    el.className='out';
    return full;
  } catch(e){ el.textContent='Error: '+e.message; el.className='out'; return ''; }
}

// ── BADGE ─────────────────────────────────────────────────────────
function badge(l){
  if(l.delivered) return '<span class="badge b-del">Delivered</span>';
  if(l.onboarded) return '<span class="badge b-ob">Onboarded</span>';
  if(l.converted) return '<span class="badge b-conv">Converted</span>';
  if(l.replied)   return '<span class="badge b-rep">Replied</span>';
  if(l.dmSent)    return '<span class="badge b-dm">DM Sent</span>';
  return '<span class="badge b-new">New</span>';
}

function apiOk(){ return apiKey.startsWith('xai-'); }

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const s = stats();
  document.getElementById('mrrVal').textContent = s.mrr.toLocaleString();

  // nav
  const navItems = [
    {id:'dashboard',label:'Dashboard',badge:0},
    {id:'leads',label:'Lead Gen',badge:s.total},
    {id:'outreach',label:'Outreach',badge:s.dm},
    {id:'onboarding',label:'Onboarding',badge:s.conv},
    {id:'delivery',label:'Delivery',badge:s.del},
    {id:'guide',label:'How To Guide',badge:0},
  ];
  document.getElementById('nav').innerHTML = navItems.map(n=>`
    <div class="ni ${currentPage===n.id?'on':''}" onclick="goTo('${n.id}')">
      <div class="ni-dot"></div>${n.label}
      ${n.badge>0?`<span class="nb">${n.badge}</span>`:''}
    </div>`).join('');

  document.getElementById('pageTitle').textContent = PAGES[currentPage].title;
  document.getElementById('pageSub').textContent = PAGES[currentPage].sub;

  // update api status
  const st = document.getElementById('apiStatus');
  if(st) st.innerHTML = apiOk()
    ? '<span class="ok">✓ Grok connected</span>'
    : '<span class="no">✗ add xai- key</span>';

  // pages
  const pc = document.getElementById('pageContent');
  if(currentPage==='dashboard') pc.innerHTML = dashboardHTML(s);
  else if(currentPage==='leads') pc.innerHTML = leadsHTML();
  else if(currentPage==='outreach') pc.innerHTML = outreachHTML();
  else if(currentPage==='onboarding') pc.innerHTML = onboardHTML();
  else if(currentPage==='delivery') pc.innerHTML = deliveryHTML();
  else if(currentPage==='guide') pc.innerHTML = guideHTML();
}

function goTo(p){ currentPage=p; render(); }

// ── API KEY INPUT ─────────────────────────────────────────────────
document.addEventListener('input', e=>{
  if(e.target.id==='apiKeyInput'){
    apiKey = e.target.value.trim();
    localStorage.setItem(KEY, apiKey);
    const st = document.getElementById('apiStatus');
    if(st) st.innerHTML = apiOk()
      ? '<span class="ok">✓ Grok connected</span>'
      : '<span class="no">✗ add xai- key</span>';
  }
});

// ── DASHBOARD ─────────────────────────────────────────────────────
function dashboardHTML(s){
  const recent = [...leads].reverse().slice(0,5);
  return `
  <div class="g3" style="margin-bottom:16px;">
    <div class="stat"><div class="stat-label">Total Leads</div><div class="stat-val b">${s.total}</div><div class="stat-sub">in pipeline</div></div>
    <div class="stat"><div class="stat-label">DMs Sent</div><div class="stat-val o">${s.dm}</div><div class="stat-sub">${s.dm>0?Math.round(s.rep/s.dm*100):0}% reply rate</div></div>
    <div class="stat"><div class="stat-label">Converted</div><div class="stat-val g">${s.conv}</div><div class="stat-sub">paying clients</div></div>
    <div class="stat"><div class="stat-label">Replies</div><div class="stat-val">${s.rep}</div><div class="stat-sub">engaged</div></div>
    <div class="stat"><div class="stat-label">Delivered</div><div class="stat-val g">${s.del}</div><div class="stat-sub">live bots</div></div>
    <div class="stat"><div class="stat-label">MRR</div><div class="stat-val g" style="font-size:22px;">₹${s.mrr.toLocaleString()}</div><div class="stat-sub">₹${(s.mrr*12).toLocaleString()} ARR</div></div>
  </div>
  <div class="pipe">
    ${[['Leads',s.total],['DM Sent',s.dm],['Replied',s.rep],['Converted',s.conv],['Delivered',s.del]].map(([l,c])=>`
    <div class="ps ${c>0?'on':''}"><span class="ps-n">${c}</span>${l}</div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">Recent Activity</div>
    <div class="tw"><table>
      <thead><tr><th>Name</th><th>Business</th><th>Industry</th><th>Status</th></tr></thead>
      <tbody>${recent.map(l=>`<tr><td>${l.name}</td><td><b>${l.biz}</b></td><td>${l.industry}</td><td>${badge(l)}</td></tr>`).join('')}</tbody>
    </table></div>
  </div>
  <div class="alert a-info">💡 <b>Today:</b> Add 10 leads → Send 30 DMs → Follow up replies → Close 1 at ₹2,000. That's your day.</div>`;
}

// ── LEADS ─────────────────────────────────────────────────────────
function leadsHTML(){
  return `
  <div class="tabs">
    <div class="tab on" onclick="switchTab(this,'lt-list')">Pipeline (${leads.length})</div>
    <div class="tab" onclick="switchTab(this,'lt-add')">Add Lead</div>
    <div class="tab" onclick="switchTab(this,'lt-gen')">AI Generate</div>
  </div>
  <div id="lt-list">
    <div class="card">
      <div class="card-title">Lead Pipeline</div>
      <div class="tw"><table>
        <thead><tr><th>Name</th><th>Business</th><th>City</th><th>Industry</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>${leads.map(l=>`<tr>
          <td><b>${l.name}</b></td><td>${l.biz}</td><td>${l.city}</td><td>${l.industry}</td>
          <td>${badge(l)}</td>
          <td>
            ${!l.dmSent?`<button class="btn btn-o btn-sm" onclick="updateLead(${l.id},{dmSent:true})">DM Sent</button>`:''}
            ${l.dmSent&&!l.replied?`<button class="btn btn-o btn-sm" onclick="updateLead(${l.id},{replied:true})">Got Reply</button>`:''}
            ${l.replied&&!l.converted?`<button class="btn btn-p btn-sm" onclick="updateLead(${l.id},{converted:true})">Converted!</button>`:''}
          </td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  </div>
  <div id="lt-add" style="display:none;">
    <div class="card">
      <div class="card-title">Add Lead Manually</div>
      <div class="g2">
        <div class="field"><label>Full Name</label><input id="l-name" placeholder="Rajesh Mehta"/></div>
        <div class="field"><label>Business Name</label><input id="l-biz" placeholder="Mehta Real Estate"/></div>
        <div class="field"><label>City</label><input id="l-city" placeholder="Pune"/></div>
        <div class="field"><label>Industry</label><select id="l-ind">${INDUSTRIES.map(i=>`<option>${i}</option>`).join('')}</select></div>
        <div class="field"><label>Source</label><select id="l-src"><option>LinkedIn</option><option>Facebook</option><option>IndiaMART</option><option>Referral</option></select></div>
        <div class="field"><label>Job Title</label><input id="l-title" value="Owner"/></div>
      </div>
      <button class="btn btn-p" onclick="doAddLead()">+ Add to Pipeline</button>
    </div>
  </div>
  <div id="lt-gen" style="display:none;">
    <div class="card">
      <div class="card-title">AI Lead Research — Grok</div>
      ${!apiOk()?'<div class="alert a-warn">Add your Grok API key (xai-...) in the sidebar.</div>':''}
      <div class="g2">
        <div class="field"><label>Industry</label><select id="g-ind">${INDUSTRIES.map(i=>`<option>${i}</option>`).join('')}</select></div>
        <div class="field"><label>City</label><input id="g-city" placeholder="Mumbai" value="Mumbai"/></div>
      </div>
      <button class="btn btn-g" onclick="doGenLeads()" ${!apiOk()?'disabled':''}>Generate 10 Leads with Grok</button>

function doAddLead(){
  const n=v('l-name'),b=v('l-biz');
  if(!n||!b){alert('Name and business required');return;}
  addLead({name:n,biz:b,city:v('l-city'),industry:v('l-ind'),source:v('l-src'),title:v('l-title'),status:'new',dmSent:false,replied:false,converted:false,onboarded:false,delivered:false});
  ['l-name','l-biz','l-city'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
}

async function doGenLeads(){
  const btn = event.target; btn.disabled=true;
  const out = document.getElementById('gen-out'); out.style.display='block';
  await callGrok(
    'You are a B2B lead researcher for Indian SMBs. Output plain text only, no markdown.',
    `List 10 realistic Indian SMB leads for WhatsApp bot service in ${v('g-ind')} sector, ${v('g-city')}.\nFormat each: Name | Title | Business | Pain (1 line)\nMake it realistic and specific.`,
    'gen-out'
  );
  btn.disabled=false;
}

// ── OUTREACH ──────────────────────────────────────────────────────
let selOutLead = null;

    <div>

          <div class="lr ${selOutLead===l.id?'on':''}" onclick="selLead(${l.id},'out')">
            <div class="lr-name">${l.name}</div>
            <div class="lr-sub">${l.biz} · ${l.city}</div>
            <div style="margin-top:4px;">${badge(l)}</div>
          </div>`).join('')}
      </div>
    </div>
    <div>
      ${!apiOk()?'<div class="alert a-warn">Add Grok API key in sidebar to generate scripts.</div>':''}
      <div class="card" id="out-card">

}

function outReachEmpty(){ return `<div class="alert a-info" style="margin:0;">← Pick a prospect to generate personalised scripts.</div>`; }

function outReachForm(){

    <div class="card-title">${l.name} — ${l.biz}</div>
    <div class="flex-row" style="margin-bottom:14px;">
      <button class="btn btn-g" onclick="doGenDM()" ${!apiOk()?'disabled':''}>Generate DM</button>

function selLead(id, page){
  if(page==='out'){ selOutLead=id; }
  else if(page==='ob'){ selObLead=id; }
  else if(page==='del'){ selDelLead=id; }
  render();
}

async function doGenDM(){

    'out-result'

}
async function doGenEmail(){

async function doGenFollowUp(){

// ── UTILS ─────────────────────────────────────────────────────────
function v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

function switchTab(el, showId){
  const parent = el.closest('.tabs');
  parent.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const allIds = ['lt-list','lt-add','lt-gen','g-user','g-deploy','g-tools'];
  allIds.forEach(id=>{ const d=document.getElementById(id); if(d) d.style.display='none'; });
  const show = document.getElementById(showId);
  if(show) show.style.display='block';
}

function copyText(id){
  const el=document.getElementById(id);
  if(el){ navigator.clipboard.writeText(el.textContent); }
}
