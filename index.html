<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WABA • WhatsApp Bot Agency</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap');
    :root {
      --bg: #080808; --s1: #0f0f0f; --s2: #161616; --s3: #1e1e1e;
      --border: #252525; --acc: #00e676; --acc2: #ff6d00; --txt: #e8e8e8;
      --muted: #555; --danger: #ff1744;
    }
    body { background: var(--bg); color: var(--txt); font-family: 'IBM Plex Mono', monospace; margin:0; }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; background: var(--s1); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; }
    .sidebar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--acc); padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
    .nav-item { padding: 12px 20px; color: var(--muted); cursor: pointer; font-size: 11px; }
    .nav-item.active { color: var(--acc); background: rgba(0,230,118,0.1); }
    .api-input { width: 100%; padding: 8px; background: var(--s2); border: 1px solid var(--border); color: var(--txt); }
    .main { flex: 1; overflow-y: auto; background: var(--bg); }
    .topbar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 32px; }
    .card { background: var(--s1); border: 1px solid var(--border); padding: 24px; margin: 20px; border-radius: 4px; }
    .btn-primary { background: var(--acc); color: #000; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [page, setPage] = useState("dashboard");
      const apiKey = "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";

      return React.createElement("div", { className: "app" },
        React.createElement("div", { className: "sidebar" },
          React.createElement("div", { className: "sidebar-logo" }, "WABA ", React.createElement("span", null, "// whatsapp bot agency")),
          React.createElement("div", { style: { padding: "20px" } },
            React.createElement("div", { style: { fontSize: "10px", color: "#888", marginBottom: "6px" } }, "Grok (xAI) API Key"),
            React.createElement("input", { 
              type: "password", 
              value: apiKey, 
              readOnly: true,
              style: { width: "100%", padding: "8px", background: "#161616", border: "1px solid #333", color: "#ddd" }
            }),
            React.createElement("div", { style: { color: "#00e676", fontSize: "11px", marginTop: "8px" } }, "✓ Connected to Grok")
          )
        ),
        React.createElement("div", { className: "main" },
          React.createElement("div", { className: "topbar" },
            React.createElement("div", { style: { fontSize: "20px", fontFamily: "Bebas Neue, sans-serif" } }, "Command Center")
          ),
          React.createElement("div", { style: { padding: "32px" } },
            React.createElement("div", { className: "card" },
              React.createElement("h2", null, "App Loaded Successfully"),
              React.createElement("p", null, "Your Grok key is working."),
              React.createElement("p", null, "Current Page: " + page),
              React.createElement("button", {
                className: "btn-primary",
                onClick: () => setPage(page === "dashboard" ? "leads" : "dashboard")
              }, "Switch Page")
            )
          )
        )
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
