  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_KEY_STORAGE = "wa_agent_api_key";

    async function callGrok(apiKey, systemPrompt, userPrompt, onChunk) {
      try {
        const res = await fetch("https://api.x.ai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: "grok-4-1-fast-reasoning",
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ],
            stream: true,
            max_tokens: 1200
          })
        });
        if (!res.ok) throw new Error("API error");
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
          for (const line of lines) {
            try {
              const d = JSON.parse(line.slice(6));
              if (d.choices && d.choices[0].delta.content) {
                full += d.choices[0].delta.content;
                onChunk(full);
              }
            } catch (e) {}
          }
        }
      } catch (e) {
        console.error(e);
        onChunk("Error calling Grok: " + e.message);
      }
    }
