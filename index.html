  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_KEY_STORAGE = "wa_agent_api_key";

    // GROK API CALL - Replaces Claude
    async function callGrok(apiKey, systemPrompt, userPrompt, onChunk) {
      const res = await fetch("https://api.x.ai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "grok-4-1-fast-reasoning",
          max_tokens: 1500,
          stream: true,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userPrompt }
          ]
        })
      });

      if (!res.ok) throw new Error(`Grok API error ${res.status}`);

      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let full = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = dec.decode(value);
        const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
        for (const line of lines) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.choices && d.choices[0]?.delta?.content) {
              full += d.choices[0].delta.content;
              onChunk(full);
            }
          } catch (e) {}
        }
      }
      return full;
    }

    // === YOUR FULL ORIGINAL CODE (with Grok changes) ===

      { id: 3, name: "Anil Gupta", title: "Proprietor", biz: "Gupta Diagnostics Clinic", city: "Jaipur", industry: "Clinic", phone: "+91 99282 XXXXX", source: "LinkedIn", status: "new", dmSent: false, replied: false, converted: false, onboarded: false, delivered: false, notes: "" },

    function App() {

      const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || "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");
      const [leads, setLeads] = useState(SAMPLE_LEADS);

      useEffect(() => { localStorage.setItem(API_KEY_STORAGE, apiKey); }, [apiKey]);

      const apiOk = apiKey.startsWith("gsk_") || apiKey.length > 30;

      const stats = {

      const addLead = (lead) => setLeads(prev => [...prev, { ...lead, id: Date.now() }]);

      // Replace callClaude with callGrok in all AI functions (Leads, Outreach, Onboarding, Delivery)

      const pages = {

        leads: <Leads leads={leads} updateLead={updateLead} addLead={addLead} apiKey={apiKey} apiOk={apiOk} />,

      const navItems = [

      const pageTitles = { dashboard: "Command Center", leads: "Lead Generation", outreach: "Outreach Engine", onboarding: "Client Onboarding", delivery: "Bot Delivery" };
      const pageSubs = { dashboard: "Full pipeline overview", leads: "Find & manage prospects", outreach: "AI-generated DM scripts", onboarding: "Client intake & bot config", delivery: "Generate & hand off WhatsApp bots" };

      return React.createElement(React.Fragment, null,
        React.createElement('style', null, css),

            React.createElement('div', { className: "sidebar-logo" }, "WABA", React.createElement('span', null, "// whatsapp bot agency")),
            /* nav items */
            React.createElement('nav', { className: "nav" }, 
              navItems.map(n => React.createElement('div', {
                key: n.id,
                className: `nav-item ${page === n.id ? "active" : ""}`,
                onClick: () => setPage(n.id)
              }, React.createElement('div', { className: "nav-dot" }), n.label, n.badge > 0 && React.createElement('span', { className: "nav-badge" }, n.badge)))
            ),

            )
