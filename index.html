const INDUSTRIES = ['Real Estate','Coaching','Clinic','Salon','Logistics','Retail','Restaurant','Travel Agency','Gym','Finance/CA'];

// ── GROK API (Fixed) ──────────────────────────────────────────────────────
async function callGrok(system, user, outputId){
  const el = document.getElementById(outputId);
  if(!el) return '';
  el.className = 'out live';
  el.textContent = '⏳ Grok is thinking...';
  
  try {
    const res = await fetch('https://api.x.ai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + apiKey
      },
      body:JSON.stringify({
        model: "grok-4-1-fast-reasoning",   // Better model
        max_tokens: 1200,
        stream: true,
        messages: [
          {role:'system', content: system},
          {role:'user', content: user}
        ]
      })
    });

    if(!res.ok) {
      el.textContent = 'API Error: ' + res.status + '. Check your Grok key.';
      return '';
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '';
    el.textContent = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = dec.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data: ') && !l.includes('[DONE]'));
      
      for(const line of lines){
        try{
          const d = JSON.parse(line.slice(6));
          const t = d.choices?.[0]?.delta?.content || '';
          if(t){
            full += t;
            el.textContent = full;
          }
        }catch(e){}
      }
    }
    el.className = 'out';
    return full;
  } catch(e){
    el.textContent = 'Error: ' + e.message;
    el.className = 'out';
    return '';
  }
}

function apiOk(){ 
  return apiKey && (apiKey.startsWith('gsk_') || apiKey.length > 20); 
}
