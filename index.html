<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotFlow AI | 60-Second WhatsApp Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-slate-900 font-sans">
    <nav class="p-6 bg-white border-b flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight text-blue-600">BotFlow.ai</h1>
        <div id="razorpay-button-container">
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium">Get Access - ₹1,999</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4">Your WhatsApp Bot. Done in 60 Seconds.</h2>
            <p class="text-lg text-slate-600">Stop manually replying. Enter business info -> Get copy-paste bot logic.</p>
        </div>

        <section class="bg-white p-8 rounded-2xl shadow-sm border">
            <div class="grid gap-6">
                <div>
                    <label class="block font-bold mb-2">Groq API Key</label>
                    <input type="password" id="apiKey" class="w-full p-3 border rounded-lg" placeholder="gsk_...">
                </div>
                <div>
                    <label class="block font-bold mb-2">Business Name & Niche</label>
                    <input type="text" id="bizName" class="w-full p-3 border rounded-lg" placeholder="e.g. Agarwal Steel Manufacturing">
                </div>
                <div>
                    <label class="block font-bold mb-2">What should the bot do?</label>
                    <textarea id="bizGoal" class="w-full p-3 border rounded-lg" rows="3" placeholder="e.g. Qualify leads, share price list, book site visits"></textarea>
                </div>
                <button onclick="generateBot()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-black transition">Generate Bot Logic ✨</button>
            </div>
        </section>

        <section id="result" class="mt-8 hidden">
            <div class="bg-green-50 border border-green-200 p-6 rounded-2xl">
                <h3 class="font-bold text-green-800 mb-4">Your Bot Configuration (Copy-Paste to Wati/Interakt):</h3>
                <pre id="output" class="whitespace-pre-wrap text-sm bg-white p-4 rounded border overflow-x-auto"></pre>
            </div>
        </section>
    </main>

    <script>
        async function generateBot() {
            const key = document.getElementById('apiKey').value;
            const biz = document.getElementById('bizName').value;
            const goal = document.getElementById('bizGoal').value;
            const output = document.getElementById('output');
            const resultDiv = document.getElementById('result');

            if(!key) return alert("Enter API Key");

            output.innerText = "Processing Logic...";
            resultDiv.classList.remove('hidden');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "user", content: `Create a professional WhatsApp automation flow for ${biz}. Goal: ${goal}. Output step-by-step logic and the exact welcome message.`}]
                    })
                });
                const data = await response.json();
                output.innerText = data.choices[0].message.content;
            } catch (e) {
                output.innerText = "Error: Check API key or connection.";
            }
        }
    </script>
</body>
</html>
